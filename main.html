<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Click and Drag</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="items">
    <div class="item item1">01</div>
    <div class="item item2">02</div>
    <div class="item item3">03</div>
    <div class="item item4">04</div>
    <div class="item item5">05</div>
    <div class="item item6">06</div>
    <div class="item item7">07</div>
    <div class="item item8">08</div>
    <div class="item item9">09</div>
    <div class="item item10">10</div>
    <div class="item item11">11</div>
    <div class="item item12">12</div>
    <div class="item item13">13</div>
    <div class="item item14">14</div>
    <div class="item item15">15</div>
    <div class="item item16">16</div>
    <div class="item item17">17</div>
    <div class="item item18">18</div>
    <div class="item item19">19</div>
    <div class="item item20">20</div>
    <div class="item item21">21</div>
    <div class="item item22">22</div>
    <div class="item item23">23</div>
    <div class="item item24">24</div>
    <div class="item item25">25</div>
  </div>

<script>
const container = document.querySelector('.items');
const cubes = document.querySelectorAll('.item');

let isDragging = false;
let currentCube = null;
let startX, startY, initialLeft, initialTop;

// 1. Initial Setup: Convert CSS layout to absolute positioning for free dragging
window.addEventListener('load', () => {
  const positions = [];

  // Record initial positions first to prevent layout shifting
  cubes.forEach(cube => {
    positions.push({
      left: cube.offsetLeft,
      top: cube.offsetTop
    });
  });

  // Apply absolute positioning so individual cubes can be moved freely
  cubes.forEach((cube, i) => {
    cube.style.position = 'absolute';
    cube.style.left = `${positions[i].left}px`;
    cube.style.top = `${positions[i].top}px`;
    // Prevent default CSS transitions from causing drag lag
    cube.style.transition = 'none'; 
  });
});

// 2. Drag Behavior: Attach event listeners to each cube
cubes.forEach(cube => {
  cube.addEventListener('mousedown', (e) => {
    isDragging = true;
    currentCube = cube;

    // Bring the selected cube to the front
    cubes.forEach(c => c.style.zIndex = '1');
    cube.style.zIndex = '100';
    
    // Visual cue for grabbing
    cube.style.cursor = 'grabbing';

    // Record the starting coordinates of the mouse and the cube
    startX = e.clientX;
    startY = e.clientY;
    initialLeft = cube.offsetLeft;
    initialTop = cube.offsetTop;
  });
});

// 3. Movement Behavior: Update position dynamically
document.addEventListener('mousemove', (e) => {
  if (!isDragging || !currentCube) return;

  e.preventDefault(); // Prevent text selection and visual glitches while dragging

  // Calculate how far the mouse has moved
  const dx = e.clientX - startX;
  const dy = e.clientY - startY;

  // Calculate the new intended position
  let newLeft = initialLeft + dx;
  let newTop = initialTop + dy;

  // 4. Constraints Handling: Boundary checks to keep cubes inside the defined area
  // Calculate maximum boundaries based on the container's padding box
  const maxLeft = container.clientWidth - currentCube.offsetWidth;
  const maxTop = container.clientHeight - currentCube.offsetHeight;

  // Enforce boundary snapping
  if (newLeft < 0) newLeft = 0;
  if (newTop < 0) newTop = 0;
  if (newLeft > maxLeft) newLeft = maxLeft;
  if (newTop > maxTop) newTop = maxTop;

  // Apply the new position
  currentCube.style.left = `${newLeft}px`;
  currentCube.style.top = `${newTop}px`;
});

// 5. Drop Behavior: Releasing the mouse
document.addEventListener('mouseup', () => {
  if (isDragging && currentCube) {
    // Reset cursor and dragging state
    currentCube.style.cursor = 'pointer';
    isDragging = false;
    currentCube = null;
  }
});
</script>

  </body>
</html>
